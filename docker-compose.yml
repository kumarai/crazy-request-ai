services:
  migrate:
    build: ./backend
    command: python -m app.db.migrations upgrade
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  web:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir
      /app/app
    environment:
      WATCHFILES_FORCE_POLLING: "true"
      MCP_SERVER_URL: "http://mcp-server:8765/mcp"
    ports: [ "8000:8000" ]
    volumes:
      - ./backend:/app
      - ./sample-data:/data:ro
      - repos_data:/repos
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      mcp-server:
        condition: service_started
    restart: unless-stopped

  mcp-server:
    build:
      context: .
      dockerfile: ./backend/mcp_server/Dockerfile
    environment:
      MCP_BACKEND: "sqlite"
      MCP_SQLITE_PATH: "/data/mcp/mcp_data.db"
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8765"
      MCP_SEED: "true"
      MCP_LOG_LEVEL: "INFO"
    ports: [ "8765:8765" ]
    volumes:
      - mcp_data:/data/mcp
      - ./backend:/app
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "corepack enable && yarn install --frozen-lockfile && yarn dev
      --host 0.0.0.0 --port 3000"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    ports: [ "3000:3000" ]
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on: [ web ]
    restart: unless-stopped

  celery-worker:
    build: ./backend
    command: celery -A app.tasks.celery_app worker -Q indexing,default -c 4
      --loglevel=info
    volumes:
      - ./backend:/app
      - ./sample-data:/data:ro
      - repos_data:/repos
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    deploy:
      replicas: 2

  celery-beat:
    build: ./backend
    command: celery -A app.tasks.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  flower:
    build: ./backend
    command: celery -A app.tasks.celery_app flower --port=5555
    ports: [ "5555:5555" ]
    volumes:
      - ./backend:/app
    depends_on: [ redis ]
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: devknowledge
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes: [ pgdata:/var/lib/postgresql/data ]
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U app -d devknowledge" ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes: [ redisdata:/data ]
    restart: unless-stopped

volumes:
  frontend_node_modules:
  pgdata:
  redisdata:
  repos_data:
  minio_data:
  ollama_data:
  mcp_data:
